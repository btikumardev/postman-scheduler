name: Postman Scheduled Run

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  run-postman:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Newman and Reporters
        run: npm install -g newman newman-reporter-htmlextra

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Verify required files
        run: |
          echo "Files in repo root:"
          ls -la
          test -f "LogIn.postman_collection.json" || (echo "Collection file missing!" && exit 1)
          test -f "EINO_Testing_ENV.postman_environment.json" || (echo "Environment file missing!" && exit 1)

      - name: Create Reports Directory
        run: mkdir -p reports

      - name: Debug Trigger
        run: |
          echo "Event = ${{ github.event_name }}"
          echo "UTC Time = $(date -u)"

      - name: Run Postman Collection
        id: newman
        continue-on-error: true
        run: |
          set +e
          newman run "LogIn.postman_collection.json" \
            -e "EINO_Testing_ENV.postman_environment.json" \
            -r cli,json,htmlextra \
            --reporter-json-export reports/report.json \
            --reporter-htmlextra-export reports/report.html \
            > reports/newman.log 2>&1
          EXIT_CODE=$?
          echo "Newman exit code: $EXIT_CODE"
          cat reports/newman.log
          exit 0

      - name: Parse Newman Results
        if: always()
        run: |
          if [ ! -f reports/report.json ]; then
            ERROR_MSG="Newman did not create report.json"
            if [ -f reports/newman.log ]; then
              ERROR_MSG=$(tail -n 5 reports/newman.log | tr '\n' ' ')
            fi
            echo "TOTAL=0" >> "$GITHUB_ENV"
            echo "PASSED=0" >> "$GITHUB_ENV"
            echo "FAILED=0" >> "$GITHUB_ENV"
            echo "FAILED_APIS=${ERROR_MSG}" >> "$GITHUB_ENV"
            exit 0
          fi

          TOTAL=$(jq '.run.stats.requests.total // 0' reports/report.json)
          FAILED=$(jq '.run.failures | length' reports/report.json)
          PASSED=$((TOTAL - FAILED))

          FAILED_APIS=$(jq -r '.run.failures[].source.name' reports/report.json 2>/dev/null | sort -u | paste -sd ", " -)
          if [ -z "$FAILED_APIS" ]; then
            FAILED_APIS="None"
          fi

          echo "TOTAL=$TOTAL" >> "$GITHUB_ENV"
          echo "PASSED=$PASSED" >> "$GITHUB_ENV"
          echo "FAILED=$FAILED" >> "$GITHUB_ENV"
          echo "FAILED_APIS=$FAILED_APIS" >> "$GITHUB_ENV"

          echo "Parsed results:"
          echo "TOTAL=$TOTAL PASSED=$PASSED FAILED=$FAILED"
          echo "FAILED_APIS=$FAILED_APIS"

      - name: Upload HTML Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: postman-report
          path: reports/report.html
          if-no-files-found: ignore

      - name: Notify Teams
        if: always()
        env:
          TEAMS_WEBHOOK_URL: ${{ secrets.TEAMS_WEBHOOK_URL }}
          NEWMAN_RESULT: ${{ steps.newman.outcome }}
        run: |
          if [ -z "$TEAMS_WEBHOOK_URL" ]; then
            echo "ERROR: TEAMS_WEBHOOK_URL secret is not set!"
            exit 1
          fi

          if [ "${NEWMAN_RESULT}" = "success" ] && [ "${TOTAL}" != "0" ]; then
            STATUS="PASSED"
            COLOR="00FF00"
          else
            STATUS="FAILED"
            COLOR="FF0000"
          fi

          EXECUTION_TIME=$(date -u '+%Y-%m-%d %H:%M UTC')

          jq -n \
            --arg status "$STATUS" \
            --arg color "$COLOR" \
            --arg total "${TOTAL:-0}" \
            --arg passed "${PASSED:-0}" \
            --arg failed "${FAILED:-0}" \
            --arg failedApis "${FAILED_APIS:-Unknown}" \
            --arg time "$EXECUTION_TIME" \
            '{
              "@type": "MessageCard",
              "@context": "https://schema.org/extensions",
              "summary": "Postman Collection Execution",
              "themeColor": $color,
              "title": "Postman Collection Execution Report",
              "sections": [
                {
                  "facts": [
                    { "name": "Status", "value": $status },
                    { "name": "Total APIs", "value": $total },
                    { "name": "Passed APIs", "value": $passed },
                    { "name": "Failed APIs", "value": $failed },
                    { "name": "Failed API Names", "value": $failedApis },
                    { "name": "Execution Time", "value": $time }
                  ],
                  "markdown": true
                }
              ]
            }' > payload.json

          HTTP_CODE=$(curl -sS -w "%{http_code}" -o /tmp/teams_response.txt \
            -X POST \
            -H "Content-Type: application/json" \
            --data @payload.json \
            "$TEAMS_WEBHOOK_URL")

          echo "Teams HTTP status: $HTTP_CODE"
          cat /tmp/teams_response.txt
