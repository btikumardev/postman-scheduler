name: Postman Scheduled Run

on:
   workflow_dispatch:
  schedule:
    - cron: '*/5 * * * *'

jobs:
  run-postman:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install Newman
        run: |
          npm install -g newman
          npm install -g newman-reporter-htmlextra

      - name: Create reports directory
        run: mkdir -p reports

      - name: Run Postman Collection
        id: newman
        continue-on-error: true
        run: |
          newman run "LogIn.postman_collection.json" \
          -e "EINO Testing ENV.postman_environment.json" \
          -r cli,htmlextra \
          --reporter-htmlextra-export reports/report.html

      - name: Upload HTML Report
        uses: actions/upload-artifact@v4
        with:
          name: postman-report
          path: reports/report.html

      - name: Notify Teams - Success
        if: success()
        run: |
          curl -H "Content-Type: application/json" \
          -d '{"text":"✅ Postman Scheduled Run completed successfully.\nHTML report has been uploaded as artifact."}' \
          "${{ secrets.TEAMS_WEBHOOK_URL }}"

      - name: Notify Teams - Failure
        if: failure()
        run: |
          curl -H "Content-Type: application/json" \
          -d '{"text":"❌ Postman Scheduled Run failed. Please check GitHub Actions logs."}' \
          "${{ secrets.TEAMS_WEBHOOK_URL }}"

