name: Postman Scheduled Run

on:
  workflow_dispatch:
  schedule:
    - cron: '*/5 * * * *'

jobs:
  run-postman:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Newman
        run: |
          npm install -g newman newman-reporter-htmlextra

      - name: Create reports directory
        run: mkdir -p reports

      - name: Run Postman Collection
        id: newman
        continue-on-error: true
        run: |
          newman run "LogIn.postman_collection.json" \
            -e "EINO Testing ENV.postman_environment.json" \
            -r cli,htmlextra \
            --reporter-htmlextra-export reports/report.html

      - name: Upload HTML Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: postman-report
          path: reports/report.html

      - name: Notify Teams
        if: always() && secrets.TEAMS_WEBHOOK_URL != ''
        run: |
          if [ "${{ steps.newman.outcome }}" = "success" ]; then
            STATUS="✅ Passed"
            COLOR="00FF00"
          else
            STATUS="❌ Failed"
            COLOR="FF0000"
          fi

          curl -f -sS -X POST "${{ secrets.TEAMS_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d "{
              \"@type\": \"MessageCard\",
              \"@context\": \"http://schema.org/extensions\",
              \"summary\": \"Postman Run\",
              \"themeColor\": \"${COLOR}\",
              \"title\": \"Postman Scheduled Run\",
              \"text\": \"${STATUS}\"
            }"
