name: Postman Scheduled Run

on:
  schedule:
    - cron: '30 2 * * *'
  workflow_dispatch:
  
jobs:
  run-postman:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Newman
        run: npm install -g newman newman-reporter-htmlextra

      - name: Create reports directory
        run: mkdir -p reports

      - name: Debug trigger
        run: |
          echo "Event = ${{ github.event_name }}"
          echo "UTC time = $(date -u)"

      - name: Run Postman Collection
        id: newman
        continue-on-error: true
        run: |
          newman run "LogIn.postman_collection.json" \
            -e "EINO_Testing_ENV.postman_environment.json" \
            -r cli,htmlextra \
            --reporter-htmlextra-export reports/report.html

      - name: Upload HTML Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: postman-report
          path: reports/report.html

      - name: Notify Teams
        if: always()
        env:
          TEAMS_WEBHOOK_URL: ${{ secrets.TEAMS_WEBHOOK_URL }}
          NEWMAN_RESULT: ${{ steps.newman.outcome }}
        run: |
          if [ -z "$TEAMS_WEBHOOK_URL" ]; then
            echo "ERROR: TEAMS_WEBHOOK_URL secret is not set!"
            exit 1
          fi
          if [ "$NEWMAN_RESULT" = "success" ]; then
            STATUS="Passed"
            COLOR="00FF00"
          else
            STATUS="Failed"
            COLOR="FF0000"
          fi
          PAYLOAD=$(cat <<EOF
          {
            "@type": "MessageCard",
            "@context": "https://schema.org/extensions",
            "summary": "Postman Run",
            "themeColor": "${COLOR}",
            "title": "Postman Scheduled Run",
            "text": "Postman run ${STATUS} at $(date -u '+%Y-%m-%d %H:%M UTC')"
          }
          EOF
          )
          HTTP_CODE=$(curl -sS -w "%{http_code}" -o /tmp/teams_response.txt \
            -X POST "$TEAMS_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD")
          echo "Teams HTTP status: $HTTP_CODE"
          cat /tmp/teams_response.txt
